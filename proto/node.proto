syntax = "proto3";

package ratelimit;

message LimitRequest {
  string client_id = 1;
  int64 tokens_requested = 2;
  int64 timestamp = 3;
  string request_id = 4;
}

message LimitResponse {
  bool allowed = 1;
  int64 remaining_tokens = 2;
  int64 retry_after_ms = 3;
  string node_id = 4;
  bool used_redis = 5;
  bool redis_failure = 6;
  string target_node = 7;
  string request_id = 8;
}

message SyncState {
  string client_id = 1;
  int64 tokens = 2;
  int64 last_refill_timestamp = 3;
  string source_node_id = 4;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string node_id = 2;
}

service RateLimiterService {
  rpc CheckLimit(LimitRequest) returns (LimitResponse);
  rpc SyncTokenState(SyncState) returns (LimitResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}
